name: Sync upstream gstack

on:
  schedule:
    # Check for upstream updates daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vstack
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/garrytan/gstack.git || true
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          # Find the merge base between our main and upstream
          MERGE_BASE=$(git merge-base HEAD upstream/main 2>/dev/null || echo "")
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            COMMIT_COUNT=$(git rev-list "$MERGE_BASE"..upstream/main --count 2>/dev/null || echo "unknown")
            echo "commit_count=$COMMIT_COUNT" >> "$GITHUB_OUTPUT"
            echo "Found $COMMIT_COUNT new upstream commits"
          fi

      - name: Create sync branch and PR
        if: steps.check.outputs.up_to_date == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="upstream-sync/$(date +%Y-%m-%d)"

          # Check if branch already exists
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Sync branch $BRANCH already exists, updating it"
            git checkout "$BRANCH"
            git merge upstream/main --no-edit || {
              echo "Merge conflict detected - will need manual resolution"
              git merge --abort
              git checkout -b "${BRANCH}-conflict"
              git merge upstream/main --no-commit --no-ff || true
              git add -A
              git commit -m "upstream sync (conflicts need resolution)" --allow-empty
            }
          else
            git checkout -b "$BRANCH"
            git merge upstream/main --no-edit || {
              echo "::warning::Merge conflicts detected"
              # Commit the conflict markers so the PR shows what needs resolution
              git add -A
              git commit -m "upstream sync with conflicts - needs manual resolution"
            }
          fi

          git push origin HEAD -u

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "PR #$EXISTING_PR already exists for this sync"
            exit 0
          fi

          # Get upstream changelog
          MERGE_BASE=$(git merge-base main upstream/main)
          CHANGELOG=$(git log "$MERGE_BASE"..upstream/main --oneline --no-merges | head -30)

          gh pr create \
            --title "Upstream sync: gstack updates ($(date +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Upstream gstack sync

          ${{ steps.check.outputs.commit_count }} new commits from [garrytan/gstack](https://github.com/garrytan/gstack).

          ### Upstream changes
          \`\`\`
          $CHANGELOG
          \`\`\`

          ### Review checklist
          - [ ] Check for conflicts with vstack customizations
          - [ ] Verify plan-eng-review modifications are preserved
          - [ ] Test skill loading after merge
          - [ ] Run \`bun run gen-skill-docs\` if templates changed

          > Auto-generated by the upstream sync workflow
          EOF
          )" \
            --label "upstream-sync" 2>/dev/null || \
          gh pr create \
            --title "Upstream sync: gstack updates ($(date +%Y-%m-%d))" \
            --body "Upstream gstack sync - ${{ steps.check.outputs.commit_count }} new commits. Review for conflicts with vstack customizations."
